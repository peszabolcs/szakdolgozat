services:
  api:
    build: .
    container_name: parkvision-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_FILE=/data/parkvision.db
      - JWT_SECRET=change-me-in-prod
      - IOT_TICK_MS=30000
    volumes:
      - parkvision-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: nginx:alpine
    container_name: parkvision-web
    ports:
      - "8080:80"
    depends_on:
      - api
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  parkvision-data:
