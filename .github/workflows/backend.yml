name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'api/**'
      - 'package*.json'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'api/**'
      - 'package*.json'
      - '.github/workflows/backend.yml'

jobs:
  backend:
    name: Express + SQLite tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build server (typecheck)
        run: npm run server:build

      - name: Run backend tests
        run: npm run server:test
