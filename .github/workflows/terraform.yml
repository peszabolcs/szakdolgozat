name: Terraform — validate + plan

on:
  push:
    branches: [main]
    paths:
      - 'sprints/02/infra/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sprints/02/infra/terraform/**'
      - '.github/workflows/terraform.yml'

defaults:
  run:
    working-directory: sprints/02/infra/terraform

jobs:
  terraform:
    name: Format, init, validate (plan if token)
    runs-on: ubuntu-latest

    env:
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'

      - name: Format check
        run: terraform fmt -check -diff

      - name: Init
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

      - name: Plan (only if Vercel token is configured)
        if: env.VERCEL_API_TOKEN != ''
        run: terraform plan -out=plan.out -input=false

      - name: Upload plan artifact
        if: env.VERCEL_API_TOKEN != ''
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: sprints/02/infra/terraform/plan.out
          retention-days: 7
